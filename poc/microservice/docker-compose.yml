services:
  microservice:
    build: .
    restart: unless-stopped
    # 8081 on the host -> 8080 in the container; 8080 is already taken by infisical.
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: coffee_soul
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
