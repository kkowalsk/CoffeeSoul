spring.application.name=microservice

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:coffee_soul}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# REST API URL + versioning. Applied as a global prefix to every @RestController
# (see ApiPathConfig), so endpoints resolve under <base-path>/<version>, e.g.
# /api/v1/brews. Actuator endpoints are unaffected and stay under /actuator.
api.base-path=/api
api.version=v1
