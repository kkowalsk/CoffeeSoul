services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coffee_soul
      POSTGRES_USER: <USER>
      POSTGRES_PASSWORD: <PASSWORD>
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U <USER> -d <PASSWORD>"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
