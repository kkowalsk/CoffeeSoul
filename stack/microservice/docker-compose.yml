services:
  microservice:
    build: .
    restart: unless-stopped
    # 8081 on the host -> 8080 in the container; 8080 is already taken by infisical.
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: coffee_soul
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    # health only reports UP once the app has fully started, which includes
    # Flyway finishing its migrations -- so dependents that wait on
    # service_healthy are guaranteed the schema exists.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
