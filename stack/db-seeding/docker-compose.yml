services:
  db-seeding:
    build: .
    # waits for the api, not just the db: the api's Flyway migrations create the
    # schema this seeder inserts into, so it must run after the app is healthy.
    depends_on:
      api:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: coffee_soul
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
