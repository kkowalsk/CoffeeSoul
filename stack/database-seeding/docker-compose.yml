services:
  database-seeding:
    build: .
    # waits for the microservice, not just the db: the microservice's Flyway
    # migrations create the schema this seeder inserts into, so it must run
    # after the app is healthy.
    depends_on:
      microservice:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: coffee_soul
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
