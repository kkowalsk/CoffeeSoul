server {
    listen 80;
    server_name coffeesoul.kowalski.nz;

    # Let's Encrypt HTTP-01 challenge -- shared certbot_www volume, must stay
    # on plain HTTP (renewal hits this same path with nginx already running,
    # no downtime / port conflicts).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # everything else: force HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name coffeesoul.kowalski.nz;

    ssl_certificate     /etc/letsencrypt/live/coffeesoul.kowalski.nz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coffeesoul.kowalski.nz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy -- keeps the UI and API on a SINGLE origin, so the
    # browser never makes a cross-origin request and CORS never engages.
    #
    # No trailing slash / path on proxy_pass, so the original URI is forwarded
    # unchanged: /api/v1/brews -> http://api:8080/api/v1/brews (the api service
    # already serves everything under /api/v1). "api" is the compose service
    # name, resolved on the internal docker network.
    location /api/ {
        # Resolve "api" through Docker's embedded DNS on every request rather
        # than caching the IP at startup -- otherwise recreating the api
        # container (new IP) leaves nginx proxying to a dead address (502).
        # Using a variable in proxy_pass is what forces the re-resolution.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://api:8080;
        proxy_pass $upstream$request_uri;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing: serve index.html for any non-file path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
